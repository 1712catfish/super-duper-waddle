<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Softphone</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="styles.css">
    <script src="https://jssip.net/download/releases/jssip-3.10.0.min.js"></script>


</head>
<body>
<audio id="remoteAudio" autoplay></audio>


<div class="sidebar" id="sidebarFull" style="display: none">

    <div class="sidebar-header">
        <div class="sidebar-title">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21L8.5 10.5S10 13 13.5 16.5l1.113-1.724a1 1 0 011.21-.502l4.493 1.498A1 1 0 0121 16.72V20a2 2 0 01-2 2h-1C9.163 22 2 14.837 2 6V5z"/>
            </svg>
            <span class="sidebar-title-text">Softphone</span>
            <span class="status-badge" id="statusBadge">
        <span class="dot"></span>
        <span id="statusText">Offline</span>
      </span>
        </div>
        <div class="tabs">
            <div class="tab active" id="tabConnect" onclick="switchTab('connect')">Connect</div>
            <div class="tab" id="tabDial" onclick="switchTab('dial')">Dialpad</div>
        </div>
    </div>

    <!-- Connect panel -->
    <div class="tab-panel active" id="panelConnect">
        <div class="field">
            <label>WebSocket URL</label>
            <input type="text" id="cfgWs" value="ws://165.245.189.83:5066"/>
        </div>
        <div class="field-row">
            <div class="field">
                <label>Extension</label>
                <input type="text" id="cfgExt" value="1001"/>
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" id="cfgPass" placeholder="secret" value="12345"/>
            </div>
        </div>
        <div class="field">
            <label>Domain / Realm</label>
            <input type="text" id="cfgDomain" value="165.245.189.83"/>
        </div>
        <button class="btn btn-primary" id="btnConnect" onclick="toggleConnect()">Connect</button>
    </div>

    <!-- Dialpad panel -->
    <div class="tab-panel" id="panelDial">
        <div class="dial-display">
            <span class="dial-number empty" id="dialDisplay">Enter number…</span>
            <button class="dial-del" onclick="clearDigit()">⌫</button>
        </div>
        <div class="dialpad-grid">
            <div class="key" onclick="pressKey('1')">
                <div class="key-d">1</div>
                <div class="key-s">&nbsp;</div>
            </div>
            <div class="key" onclick="pressKey('2')">
                <div class="key-d">2</div>
                <div class="key-s">ABC</div>
            </div>
            <div class="key" onclick="pressKey('3')">
                <div class="key-d">3</div>
                <div class="key-s">DEF</div>
            </div>
            <div class="key" onclick="pressKey('4')">
                <div class="key-d">4</div>
                <div class="key-s">GHI</div>
            </div>
            <div class="key" onclick="pressKey('5')">
                <div class="key-d">5</div>
                <div class="key-s">JKL</div>
            </div>
            <div class="key" onclick="pressKey('6')">
                <div class="key-d">6</div>
                <div class="key-s">MNO</div>
            </div>
            <div class="key" onclick="pressKey('7')">
                <div class="key-d">7</div>
                <div class="key-s">PRS</div>
            </div>
            <div class="key" onclick="pressKey('8')">
                <div class="key-d">8</div>
                <div class="key-s">TUV</div>
            </div>
            <div class="key" onclick="pressKey('9')">
                <div class="key-d">9</div>
                <div class="key-s">WXY</div>
            </div>
            <div class="key" onclick="pressKey('*')">
                <div class="key-d">*</div>
                <div class="key-s">&nbsp;</div>
            </div>
            <div class="key" onclick="pressKey('0')">
                <div class="key-d">0</div>
                <div class="key-s">+</div>
            </div>
            <div class="key" onclick="pressKey('#')">
                <div class="key-d">#</div>
                <div class="key-s">&nbsp;</div>
            </div>
        </div>
        <div class="dial-actions">
            <button class="btn btn-success" id="btnCall" onclick="makeCall()" disabled>📞 Call</button>
            <button class="btn btn-danger" id="btnHangup" onclick="hangUp()" disabled>✕ End</button>
        </div>
    </div>

    <!--    <div class="sidebar-spacer"></div>-->

    <div style="display: flex;
        padding: 11px 16px;
        border-top: 1px solid rgb(226, 226, 226);
        align-items: center;
        justify-content: flex-end;">

        <button class="sidebar-toggle-button" onclick="collapseSidebar()">
            <svg width="70%" height="70%" viewBox="0 0 20 20" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path d="M16.5 4C17.3284 4 18 4.67157 18 5.5V14.5C18 15.3284 17.3284 16 16.5 16H3.5C2.67157 16 2 15.3284 2 14.5V5.5C2 4.67157 2.67157 4 3.5 4H16.5ZM7 15H16.5C16.7761 15 17 14.7761 17 14.5V5.5C17 5.22386 16.7761 5 16.5 5H7V15ZM3.5 5C3.22386 5 3 5.22386 3 5.5V14.5C3 14.7761 3.22386 15 3.5 15H6V5H3.5Z"></path>
            </svg>
        </button>
    </div>

</div>


<div class="sidebar" style="width: 57px;" id="sidebarCollapsed">

    <div class="sidebar-header" style="border-bottom: transparent">
        <div class="sidebar-title">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21L8.5 10.5S10 13 13.5 16.5l1.113-1.724a1 1 0 011.21-.502l4.493 1.498A1 1 0 0121 16.72V20a2 2 0 01-2 2h-1C9.163 22 2 14.837 2 6V5z"/>
            </svg>
        </div>

    </div>

    <div class="sidebar-spacer"></div>

    <div style="display: flex;
        padding: 11px 16px;
        border-top: 1px solid rgb(226, 226, 226);">

        <button class="sidebar-toggle-button" onclick="expandSidebar()">
            <svg width="70%" height="70%" viewBox="0 0 20 20" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path d="M16.5 4C17.3284 4 18 4.67157 18 5.5V14.5C18 15.3284 17.3284 16 16.5 16H3.5C2.67157 16 2 15.3284 2 14.5V5.5C2 4.67157 2.67157 4 3.5 4H16.5ZM7 15H16.5C16.7761 15 17 14.7761 17 14.5V5.5C17 5.22386 16.7761 5 16.5 5H7V15ZM3.5 5C3.22386 5 3 5.22386 3 5.5V14.5C3 14.7761 3.22386 15 3.5 15H6V5H3.5Z"></path>
            </svg>
        </button>
    </div>

</div>

<div class="sidebar" style="width: 640px" id="chatPanel">

    <div class="sidebar-header" style="border-bottom: none;">

        <div class="sidebar-title">
            <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                <circle cx="12" cy="7" r="4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="sidebar-title-text" id="chatCallerName">1000</span>
            <span class="status-badge connected">
                <span class="dot"></span>
                <span>Online</span>
            </span>
        </div>

        <div class="chat-meta">
            <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"
                 style="color:var(--muted); flex-shrink:0;">
                <circle cx="12" cy="12" r="10"/>
                <path stroke-linecap="round" d="M12 6v6l4 2"/>
            </svg>
            <span class="chat-meta-caller" id="chatMetaInfo">Agent: 1001 · Via fs1 conference</span>
            <span class="chat-meta-dur" id="chatMetaDur">00:00</span>
        </div>

    </div>

    <!-- Chat message list -->
    <div class="chat-body" id="chatBody">
        <div class="chat-divider">
            <div class="chat-divider-line"></div>
            <div class="chat-divider-label" id="chatStartLabel">Call started · --:--</div>
            <div class="chat-divider-line"></div>
        </div>
        <!-- Messages injected here by JS -->
    </div>

    <!-- Auto-detected tags -->
    <!--    <div class="chat-tags" id="chatTags">-->
    <!--        <span class="chat-tags-label">-->
    <!--            <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">-->
    <!--                <path stroke-linecap="round" stroke-linejoin="round"-->
    <!--                      d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a2 2 0 014-4z"/>-->
    <!--            </svg>-->
    <!--            Auto-detected-->
    <!--        </span>-->
    <!--        &lt;!&ndash; Tags injected here &ndash;&gt;-->
    <!--    </div>-->

    <!--    <div class="sidebar-spacer">-->
    <!--    </div>-->

    <div class="call-bar show" id="callBar">
        <div class="call-bar-info">
            <div class="call-bar-name" id="callBarName">—</div>
            <div class="call-bar-timer" id="callBarTimer">00:00</div>
        </div>
        <button class="btn btn-danger" style="padding:6px 14px;font-size:12px" onclick="hangUp()">End</button>
    </div>
</div>

<div class="main">
    <div class="main-hint">Connect to FreeSWITCH to start making calls.</div>
</div>

<!-- Incoming call popup -->
<div class="popup-overlay" id="popupOverlay">
    <div class="popup">
        <div class="popup-icon">
            <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21L8.5 10.5S10 13 13.5 16.5l1.113-1.724a1 1 0 011.21-.502l4.493 1.498A1 1 0 0121 16.72V20a2 2 0 01-2 2h-1C9.163 22 2 14.837 2 6V5z"/>
            </svg>
        </div>
        <div class="popup-label">Incoming call</div>
        <div class="popup-caller" id="popupCaller">Unknown</div>
        <div class="popup-actions">
            <button class="btn btn-danger" onclick="declineCall()">Decline</button>
            <button class="btn btn-success" onclick="answerCall()">Answer</button>
        </div>
    </div>
</div>

<script src="scripts.js"></script>

<script src="chat-mock.js"></script>

</body>
</html>
